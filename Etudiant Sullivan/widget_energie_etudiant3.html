<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Widget Énergie — Étudiant 3</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════════
   WIDGET COMPACT — ÉTUDIANT 3 (BIVARD)
   À intégrer dans un gabarit d'affichage
   Dimensions conseillées : 220px × 100%
   Fond : #16A34A (vert) — peut être changé
══════════════════════════════════════════ */

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  /* ── Démo standalone : fond gris ── */
  background: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Source Sans 3', sans-serif;
}

/* ══ WIDGET ROOT ══
   Dans le gabarit : remplacer width/height
   par 100%/100% et supprimer border-radius */
.widget {
  width: 220px;
  height: 420px;
  background: #16A34A;
  color: white;
  border-radius: 6px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  overflow: hidden;
}

/* ── Titre ── */
.w-title {
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #FDE047;
  text-shadow: 0 0 8px rgba(253,224,71,0.4);
  border-bottom: 2px solid rgba(253,224,71,0.35);
  padding-bottom: 5px;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.w-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #A7F3D0;
  flex-shrink: 0;
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── Section label ── */
.w-section {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  opacity: .65;
  margin-top: 3px;
}

/* ── Grande valeur ── */
.w-big {
  font-family: 'Oswald', sans-serif;
  font-size: 30px;
  font-weight: 700;
  line-height: 1;
  color: #fff;
}
.w-big .unit {
  font-size: 13px;
  font-weight: 400;
  opacity: .65;
  margin-left: 2px;
}

/* ── Jauge ── */
.w-gauge {
  background: rgba(0,0,0,.2);
  border-radius: 3px;
  height: 4px;
  overflow: hidden;
  margin: 3px 0 4px;
}
.w-gauge-fill {
  height: 4px;
  border-radius: 3px;
  transition: width 1s ease;
}
.fill-eol   { background: #A7F3D0; }
.fill-pv    { background: #FDE68A; }

/* ── Séparateur ── */
.w-sep {
  border: none;
  border-top: 1px solid rgba(255,255,255,.2);
  margin: 2px 0;
}

/* ── Ligne stat ── */
.w-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  opacity: .88;
}
.w-row .val {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 600;
}

/* ── Bloc CO₂ ── */
.w-co2 {
  background: rgba(0,0,0,.18);
  border-radius: 6px;
  padding: 6px 8px;
  text-align: center;
  margin-top: 2px;
}
.w-co2-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  opacity: .7;
  margin-bottom: 2px;
}
.w-co2-val {
  font-family: 'Oswald', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #A7F3D0;
}
.w-co2-unit { font-size: 11px; opacity: .65; margin-left: 2px; }

/* ── Horodatage ── */
.w-update {
  font-size: 8px;
  opacity: .45;
  text-align: center;
  margin-top: 2px;
}

</style>
</head>
<body>

<!-- ══════════════════════════════════════
     WIDGET — copier-coller dans le gabarit
══════════════════════════════════════════ -->
<div class="widget">

  <div class="w-title">
    <span class="w-dot" id="wDot"></span>
    Production d'énergie renouvelable
  </div>

  <!-- Éolienne -->
  <div class="w-section">🌬 Éolienne — Site 1</div>
  <div class="w-big" id="wEol">—<span class="unit">kWh</span></div>
  <div class="w-gauge"><div class="w-gauge-fill fill-eol" id="wEolG" style="width:0%"></div></div>

  <hr class="w-sep">

  <!-- PV -->
  <div class="w-section">☀ Photovoltaïque — Site 2</div>
  <div class="w-big" id="wPV">—<span class="unit">kWh</span></div>
  <div class="w-gauge"><div class="w-gauge-fill fill-pv" id="wPVG" style="width:0%"></div></div>

  <hr class="w-sep">

  <!-- Stats -->
  <div class="w-row"><span>⚡ Total</span>     <span class="val" id="wTotal">—</span></div>
  <div class="w-row"><span>📊 Moy. jour</span> <span class="val" id="wMoy">—</span></div>
  <div class="w-row"><span>🔢 Relevés</span>   <span class="val" id="wReleves">0</span></div>

  <hr class="w-sep">

  <!-- CO₂ -->
  <div class="w-co2">
    <div class="w-co2-label">🌱 CO₂ économisé (base fioul)</div>
    <div>
      <span class="w-co2-val" id="wCO2">—</span>
      <span class="w-co2-unit">kg</span>
    </div>
    <div style="font-size:8px;opacity:.5;margin-top:2px">750 g CO₂ / kWh évités</div>
  </div>

  <div class="w-update" id="wUpdate">En attente IPX800...</div>

</div>

<script>
// ══════════════════════════════════════
//  CONFIG — adapter selon installation
// ══════════════════════════════════════
const XML_URL    = "http://192.168.0.131/status.xml";
const REFRESH_MS = 2000;       // lecture toutes les 2s
const CO2_FACTOR = 0.75;       // 750g CO₂/kWh (fioul)
const MAX_REF    = 500;        // valeur max pour jauges (kWh)

// Buffers pour moyennes
const journal = { eol: [], pv: [] };
let nbReleves = 0;

function avg(arr) {
  return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
}

function setGauge(id, val, max) {
  document.getElementById(id).style.width = Math.min((val / max) * 100, 100) + '%';
}

async function fetchXML() {
  try {
    const res = await fetch(XML_URL, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const xml = new DOMParser().parseFromString(await res.text(), "application/xml");
    if (xml.querySelector("parsererror")) throw new Error("XML invalide");

    const eol   = parseFloat(xml.querySelector("analog1")?.textContent) || 0;
    const pv    = parseFloat(xml.querySelector("analog2")?.textContent) || 0;
    const total = parseFloat((eol + pv).toFixed(2));
    const co2   = parseFloat((total * CO2_FACTOR).toFixed(2));

    // Moyennes journalières
    journal.eol.push(eol);
    journal.pv.push(pv);
    nbReleves++;
    const moy = parseFloat(avg([...journal.eol, ...journal.pv]).toFixed(2));

    // Heure
    const t = new Date().toLocaleTimeString('fr-FR', {
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });

    // ── Mise à jour DOM ──
    document.getElementById('wEol').innerHTML    = `${eol}<span class="unit">kWh</span>`;
    document.getElementById('wPV').innerHTML     = `${pv}<span class="unit">kWh</span>`;
    document.getElementById('wTotal').textContent   = total + ' kWh';
    document.getElementById('wMoy').textContent     = moy   + ' kWh';
    document.getElementById('wReleves').textContent = nbReleves;
    document.getElementById('wCO2').textContent     = co2;
    document.getElementById('wUpdate').textContent  = 'Mis à jour : ' + t;

    setGauge('wEolG', eol, MAX_REF);
    setGauge('wPVG',  pv,  MAX_REF);

    document.getElementById('wDot').style.background = '#A7F3D0';

  } catch (e) {
    document.getElementById('wDot').style.background = '#FCA5A5';
    document.getElementById('wUpdate').textContent = '⚠ Erreur : ' + e.message;
  }
}

fetchXML();
setInterval(fetchXML, REFRESH_MS);
</script>

</body>
</html>
