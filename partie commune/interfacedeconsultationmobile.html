<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Énergie Interactif</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: 600;
}

.container {
    padding: 15px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

input {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    margin-top: 5px;
}

button {
    margin-top: 10px;
    padding: 8px;
    width: 100%;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

.value {
    font-size: 22px;
    font-weight: 600;
}

.co2 {
    font-size: 22px;
    color: #4cd964;
    font-weight: 600;
}

.timestamp {
    font-size: 12px;
    opacity: 0.7;
}

canvas {
    width: 100% !important;
    height: 250px !important;
}

@media(min-width: 768px){
    .container {
        grid-template-columns: 1fr 1fr;
    }
}
</style>
</head>

<body>

<header>
🌍 Dashboard Production Énergie - Lycée
</header>

<div class="container">

<div class="card">
<h2>🌬 Site 1 - Éolienne</h2>
<input type="number" id="eolienneInput" placeholder="Entrer kWh">
<button onclick="updateData()">Mettre à jour</button>
<div class="value" id="eolienneValue">0 kWh</div>
<div class="timestamp" id="timeEolienne"></div>
</div>

<div class="card">
<h2>☀️ Site 2 - Photovoltaïque</h2>
<input type="number" id="pvInput" placeholder="Entrer kWh">
<button onclick="updateData()">Mettre à jour</button>
<div class="value" id="pvValue">0 kWh</div>
<div class="timestamp" id="timePV"></div>
</div>

<div class="card">
<h2>📈 Historique Journalier</h2>
<canvas id="energyChart"></canvas>
</div>

<div class="card">
<h2>🌱 CO₂ Économisé</h2>
<div class="co2" id="co2Value">0 kg</div>
<div class="timestamp" id="globalTime"></div>
</div>

</div>

<script>

let historyLabels = [];
let historyEolienne = [];
let historyPV = [];

const ctx = document.getElementById('energyChart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: historyLabels,
        datasets: [
            {
                label: 'Éolienne',
                data: historyEolienne,
                borderColor: '#00c6ff',
                fill: false
            },
            {
                label: 'Photovoltaïque',
                data: historyPV,
                borderColor: '#f9d423',
                fill: false
            }
        ]
    },
    options: {
        responsive: true,
        scales: {
            y: { beginAtZero: true }
        }
    }
});

function updateData() {

    let eolienne = parseFloat(document.getElementById("eolienneInput").value) || 0;
    let pv = parseFloat(document.getElementById("pvInput").value) || 0;

    let now = new Date();
    let timeString = now.toLocaleString();

    document.getElementById("eolienneValue").innerText = eolienne + " kWh";
    document.getElementById("pvValue").innerText = pv + " kWh";

    document.getElementById("timeEolienne").innerText = "Dernière mise à jour : " + timeString;
    document.getElementById("timePV").innerText = "Dernière mise à jour : " + timeString;

    let total = eolienne + pv;
    let co2 = (total * 0.056).toFixed(2);

    document.getElementById("co2Value").innerText = co2 + " kg";
    document.getElementById("globalTime").innerText = "Calcul effectué le : " + timeString;

    historyLabels.push(now.getHours() + "h" + now.getMinutes());
    historyEolienne.push(eolienne);
    historyPV.push(pv);

    chart.update();
}

</script>

</body>
</html>
